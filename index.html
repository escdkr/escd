<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Architect</title>
    
    <!-- Google Fonts: Cinzel, Playfair Display, Inter, AND Noto Serif KR (Weights 700, 900 emphasized) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Noto+Serif+KR:wght@300;500;700;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Custom Configuration -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                dark: '#020617',    // Deep Navy/Black (Slate 950)
                charcoal: '#0f172a', // Slate 900
                gold: '#BF953F',     // Base Gold
                text: '#f8fafc',     // Slate 50
                muted: '#94a3b8',    // Slate 400
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'], // Body text
              serif: ['Noto Serif KR', 'Playfair Display', 'serif'], // Prioritize Noto Serif KR for authority
              cinzel: ['Cinzel', 'serif'],
            },
            backgroundImage: {
              'luxury-gradient': 'linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C)',
            },
            letterSpacing: {
              'tighter': '-0.05em', // Tight tracking for authoritative headlines
            }
          }
        }
      }
    </script>
    
    <style>
      body {
        background-color: #020617;
        color: #f8fafc;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        word-break: keep-all; 
        cursor: none; /* Hide default cursor for Tactical HUD Cursor */
      }
      
      a, button, input, select, textarea, [role="button"] {
        cursor: none; /* Ensure interactive elements also hide cursor */
      }

      /* Browser Autofill Hack: Force transparent-looking background and gold text */
      input:-webkit-autofill,
      input:-webkit-autofill:hover, 
      input:-webkit-autofill:focus, 
      input:-webkit-autofill:active {
        -webkit-box-shadow: 0 0 0 30px #020617 inset !important;
        -webkit-text-fill-color: #FCF6BA !important;
        transition: background-color 5000s ease-in-out 0s;
        caret-color: white;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #020617; 
      }
      ::-webkit-scrollbar-thumb {
        background: #334155; 
        border-radius: 4px;
      }

      /* 3D Book Utilities */
      .preserve-3d {
        transform-style: preserve-3d;
      }
      .backface-hidden {
        backface-visibility: hidden;
      }
      .perspective-1000 {
        perspective: 1000px;
      }

      /* Champagne Gold Text Gradient */
      .text-gold {
        background: linear-gradient(
          to right, 
          #BF953F 0%, 
          #FCF6BA 25%, 
          #B38728 50%, 
          #FBF5B7 75%, 
          #AA771C 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        background-size: 200% auto;
        animation: shine 6s linear infinite;
        text-shadow: 0 0 20px rgba(191, 149, 63, 0.2); /* Subtle glow */
      }

      /* Metallic Gradient Background */
      .bg-gold-metallic {
        background: linear-gradient(
          135deg, 
          #BF953F 0%, 
          #FCF6BA 25%, 
          #B38728 50%, 
          #FBF5B7 75%, 
          #AA771C 100%
        );
        background-size: 200% 200%;
        animation: shine 6s linear infinite;
      }

      @keyframes shine {
        to {
          background-position: 200% center;
        }
      }
      
      /* Gentle Float */
      @keyframes float-gentle {
        0%, 100% { transform: translateY(0px) rotateY(-25deg) rotateX(5deg); }
        50% { transform: translateY(-15px) rotateY(-20deg) rotateX(8deg); }
      }
      
      .book-float {
        animation: float-gentle 8s ease-in-out infinite;
      }
      
      .book-container:hover .book-float {
        animation-play-state: paused;
      }

      /* Noise Texture for that "Paper/Leather" feel */
      .noise-texture {
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.12'/%3E%3C/svg%3E");
      }
      
      /* Grid Pattern for Background (Now handled by ReactiveGrid but kept as fallback) */
      .grid-pattern {
        background-image: linear-gradient(rgba(191, 149, 63, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(191, 149, 63, 0.05) 1px, transparent 1px);
        background-size: 40px 40px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-dom": "https://esm.sh/react-dom@^19.2.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
